<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hoovi - Images</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body data-view="images">
  <div class="app-shell">
    <header class="app-header">
      <div class="brand">
        <div class="brand-badge">H</div>
        <div>
          <div class="brand-name">Hoovi</div>
          <div class="brand-subtitle">Universal API Database</div>
        </div>
      </div>

      <nav class="top-nav" id="top-nav">
        <a href="/" class="nav-pill ">Catalog</a>
        <a href="/movies.html" class="nav-pill ">Movies</a>
        <a href="/anime.html" class="nav-pill ">Anime</a>
        <a href="/music.html" class="nav-pill ">Music</a>
        <a href="/books.html" class="nav-pill ">Books</a>
        <a href="/code.html" class="nav-pill ">Code</a>
        <a href="/images.html" class="nav-pill active">Images</a>
        <a href="/videos.html" class="nav-pill ">Videos</a>
        <a href="/packs.html" class="nav-pill ">Packs</a>
      </nav>

      <div class="header-actions">
        <button class="ghost-pill" id="status-pill" type="button">Starting...</button>
      </div>
    </header>

    <main class="main-column ">
      
      <div class="content-area">
        <div class="query-bar">
          <input id="query-input" type="text" placeholder="Search high-res photos..." autocomplete="off">
          <button class="primary-pill" id="query-btn" type="button">Search</button>
        </div>
        
        <div class="section-head" style="margin-top: 16px;">
          <h2 id="catalog-title">Images Results</h2>
          <div class="section-meta" id="picks-meta">Loading items...</div>
        </div>

        <div class="scroll-container">
          <div class="card-grid" id="picks-grid"></div>
          <div class="pagination-bar" id="pagination-bar">
            <button class="ghost-pill" id="page-prev" type="button" disabled>Previous</button>
            <span class="page-info" id="page-info">Page 1</span>
            <button class="ghost-pill" id="page-next" type="button">Next</button>
          </div>
        </div>
      </div>
    </main>
  </div>

  <div class="modal-overlay" id="modal-overlay">
    <div class="modal" id="modal-content"></div>
  </div>
  <div class="toast-stack" id="toast-stack"></div>

  <script src="hoovi-fallback.js"></script>
  <script src="app.js"></script>
</body>
</html>
